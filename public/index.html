<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cosmetic Dental Concierge</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 24px; max-width: 760px; margin: 0 auto; }
      form { display: grid; gap: 12px; }
      input, select, button { padding: 10px; font-size: 16px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
    </style>
  </head>
  <body>
    <h1>Cosmetic Dental Concierge</h1>
    <p>Get matched with veneers, Invisalign, whitening, or a smile makeover. Submit your info and we will call to qualify you.</p>
    <div class="card">
      <form id="leadForm">
        <div class="row">
          <input name="fullName" placeholder="Full name" required />
          <input name="phoneE164" placeholder="Phone (+1...)" required />
        </div>
        <div class="row">
          <input name="email" placeholder="Email (optional)" />
          <select name="interest">
            <option value="">Select interest</option>
            <option value="veneers">Veneers</option>
            <option value="invisalign">Invisalign</option>
            <option value="whitening">Whitening</option>
            <option value="smile makeover">Smile Makeover</option>
          </select>
        </div>
        <button type="submit">Contact Us</button>
        <div id="status"></div>
      </form>
    </div>
    <script>
      const form = document.getElementById('leadForm');
      const status = document.getElementById('status');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        status.textContent = 'Submitting...';
        const data = Object.fromEntries(new FormData(form).entries());
        const res = await fetch('/leads', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const json = await res.json();
        if (res.ok) {
          status.textContent = 'Submitted! We will call you shortly.';
          form.reset();
        } else {
          status.textContent = 'Error: ' + (json.error || 'failed');
        }
      });
    </script>
  </body>
</html>
